<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikshepOS | Live TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg:  #000;
            --bg2: #0a0a0a;
            --bg3: #111;
            --border:  rgba(255,255,255,0.12);
            --blue:  #38bdf8;
            --green: #34d399;
            --red:   #fb7185;
            --amber: #fbbf24;
            --gold:  #eab308;
            
            /* ── Brightened Text Palette ── */
            --text:  #ffffff;             
            --text2: rgba(255,255,255,0.88); 
            --text3: rgba(255,255,255,0.55); 
            --glow:  0 0 30px rgba(56,189,248,0.15);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist Mono', monospace;
            overflow: hidden;
        }

        /* ── Dot-grid background ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, black 40%, transparent 100%);
            pointer-events: none; z-index: 0; opacity: .5;
        }

        #app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

        /* ── TOPBAR ── */
        .topbar {
            height: 54px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 20px; gap: 14px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            flex-shrink: 0; z-index: 10;
        }
        .topbar-logo {
            font-weight: 800; font-size: 15px; letter-spacing: -.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .logo-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--blue), #0284c7);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 14px rgba(56,189,248,0.4);
        }
        .topbar-logo span { color: var(--text3); }
        .topbar-spacer { flex: 1; }
        
        .status-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.25);
            padding: 4px 11px; border-radius: 100px;
            font-size: 11px; color: var(--green); font-weight: 600;
        }
        .status-badge.loading {
            background: rgba(251,191,36,0.1);
            border-color: rgba(251,191,36,0.25);
            color: var(--amber);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%; background: currentColor;
            animation: pulse-dot 2s ease infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.35} }

        .layout { display: flex; flex: 1; overflow: hidden; }

        /* ── PLAYER SIDE ── */
        .player-side {
            flex: 1; display: flex; flex-direction: column;
            padding: 20px; gap: 14px; overflow-y: auto;
        }

        .video-wrap {
            position: relative;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            flex-shrink: 0;
            box-shadow: var(--glow);
        }
        #videoPlayer { width: 100%; height: 100%; display: block; background: #000; }

        .video-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7);
            pointer-events: none;
            opacity: 0; transition: opacity .3s;
        }
        .video-overlay.show { opacity: 1; }
        .spinner-ring {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Now-playing bar */
        .now-playing {
            display: flex; align-items: center; gap: 14px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 18px;
            flex-shrink: 0;
        }
        .np-icon {
            width: 38px; height: 38px; border-radius: 8px;
            background: rgba(56,189,248,0.12);
            border: 1px solid rgba(56,189,248,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .np-label {
            font-size: 10px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text3);
            margin-bottom: 4px;
        }
        .np-name {
            font-size: 15px; font-weight: 600; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        .np-badge {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; color: var(--text3);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 100px;
        }
        .np-badge.playing { color: var(--green); border-color: rgba(52,211,153,0.2); }

        /* ── BENTO CREDITS ── */
        .bento-credits {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }
        .bento-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .bento-tag {
            font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
            color: var(--blue); text-transform: uppercase;
            background: rgba(56, 189, 248, 0.1); padding: 2px 8px; border-radius: 4px;
        }
        .bento-links a { font-size: 11px; color: var(--text3); text-decoration: none; margin-left: 12px; }
        .bento-links a:hover { color: #fff; }
        .bento-body p { font-size: 12px; line-height: 1.6; color: var(--text2); }

        /* ── WIDGET SECTION ── */
        .widget-area { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; margin-top: 4px; }
        .widget-frame { 
            border-radius: 20px; border: 1px solid #2a2a2a; background: #0d0d0d; 
            max-width: 100%; height: 280px; width: 480px;
        }
        .widget-label { font-size: 10px; color: #555; text-decoration: none; padding-left: 10px; }

        /* ── CHANNEL SIDE ── */
        .channel-side {
            width: 340px; flex-shrink: 0;
            border-left: 1px solid var(--border);
            background: #050505;
            display: flex; flex-direction: column;
        }
        .ch-header { padding: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .ch-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
        #search-input {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            color: #fff; font-family: 'Geist Mono', monospace; font-size: 13px;
            padding: 10px 12px 10px 36px; border-radius: 9px; outline: none;
        }
        #channel-list-container { flex: 1; overflow-y: auto; padding: 10px; }
        .ch-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 9px; cursor: pointer; color: var(--text2); margin-bottom: 4px; }
        .ch-item:hover, .ch-item.active { background: rgba(255,255,255,0.06); color: #fff; }
        .ch-item.active { border: 1px solid rgba(56,189,248,0.3); background: rgba(56,189,248,0.1); }
        .ch-logo { width: 32px; height: 32px; border-radius: 7px; background: #fff; padding: 2px; flex-shrink: 0; }
        .ch-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 768px) {
            .layout { flex-direction: column; overflow: auto; }
            .channel-side { width: 100%; height: 400px; border-left: none; border-top: 1px solid var(--border); }
            .widget-frame { width: 100%; height: 220px; }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="topbar">
        <div class="topbar-logo">
            <div class="logo-icon">📺</div>
            NikshepOS<span>.tv</span>
        </div>
        <div class="topbar-spacer"></div>
        <div class="status-badge loading" id="top-status">
            <div class="status-dot"></div>
            <span id="top-status-text">Syncing</span>
        </div>
    </div>

    <div class="layout">
        <div class="player-side">
            <div class="video-wrap">
                <video id="videoPlayer" controls autoplay poster="https://i.imgur.com/gC5sJd7.png"></video>
                <div class="video-overlay" id="video-overlay"><div class="spinner-ring"></div></div>
            </div>

            <div class="now-playing">
                <div class="np-icon">📡</div>
                <div style="flex:1;min-width:0">
                    <div class="np-label">Now Playing</div>
                    <div class="np-name" id="np-name">Select a channel to begin</div>
                </div>
                <div class="np-badge" id="np-badge"><div class="status-dot"></div> IDLE</div>
            </div>

            <div class="bento-credits">
                <div class="bento-header">
                    <span class="bento-tag">DEVELOPER CREDITS</span>
                    <div class="bento-links">
                        <a href="https://nikshep.vercel.app" target="_blank">Portfolio</a>
                        <a href="https://instagram.com/nikkk.exe" target="_blank">Instagram</a>
                    </div>
                </div>
                <div class="bento-body">
                    <p>
                        Engineered by <b>Nikshep Doggalli</b>. Full-Stack Developer specializing in high-fidelity 
                        React environments. Currently gamifying life performance at <b>EntropyZero</b>.
                    </p>
                    <div class="widget-area">
                        <iframe src="https://entropyzero.vercel.app/widget.html?uid=ylQMHvRKeFNNE6f553gwt8TZmyo2" frameborder="0" class="widget-frame"></iframe>
                        <a href="https://entropyzero.vercel.app" target="_blank" class="widget-label">entropyzero.vercel.app</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="channel-side">
            <div class="ch-header">
                <div class="ch-title">Channels</div>
                <div style="position:relative">
                    <span style="position:absolute;left:12px;top:10px;font-size:12px;opacity:0.5">🔍</span>
                    <input type="text" id="search-input" placeholder="Search streams…" autocomplete="off">
                </div>
            </div>
            <div id="channel-list-container">
                <div id="channel-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('videoPlayer');
    const channelListEl = document.getElementById('channel-list');
    const searchInput = document.getElementById('search-input');
    const videoOverlay = document.getElementById('video-overlay');
    const npName = document.getElementById('np-name');
    const npBadge = document.getElementById('np-badge');
    const topStatusTxt = document.getElementById('top-status-text');

    const M3U_URL = 'https://raw.githubusercontent.com/siam3310/cdn-tv/refs/heads/main/siamcdnplaylist.m3u';
    let hls, allChannels = [], activeChannel = null;

    async function fetchM3U() {
        try {
            const res = await fetch(M3U_URL);
            const text = await res.text();
            const lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',').pop().trim();
                    const logo = lines[i].match(/tvg-logo="([^"]+)"/);
                    allChannels.push({ name, logo: logo ? logo[1] : 'https://i.imgur.com/Nl4aZCF.png' });
                }
            }
            topStatusTxt.textContent = 'Live';
            document.getElementById('top-status').classList.remove('loading');
            renderChannels(allChannels.slice(0, 100));
        } catch (e) { topStatusTxt.textContent = 'Offline'; }
    }

    function renderChannels(chs) {
        channelListEl.innerHTML = '';
        chs.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'ch-item' + (activeChannel === ch.name ? ' active' : '');
            div.innerHTML = `<img src="${ch.logo}" class="ch-logo" onerror="this.src='https://i.imgur.com/Nl4aZCF.png'"><span class="ch-name">${ch.name}</span>`;
            div.onclick = () => {
                const streamUrl = `/api/proxy?channel=${encodeURIComponent(ch.name)}`;
                activeChannel = ch.name;
                npName.textContent = ch.name;
                npBadge.className = 'np-badge playing';
                videoOverlay.classList.add('show');
                if (hls) hls.destroy();
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); videoOverlay.classList.remove('show'); });
                renderChannels(chs);
            };
            channelListEl.appendChild(div);
        });
    }

    searchInput.oninput = () => {
        const term = searchInput.value.toLowerCase();
        renderChannels(allChannels.filter(c => c.name.toLowerCase().includes(term)).slice(0, 100));
    };

    document.addEventListener('DOMContentLoaded', fetchM3U);
</script>
</body>
</html>
