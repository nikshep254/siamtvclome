<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikshepOS | Live TV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg:  #000;
            --bg2: #0a0a0a;
            --bg3: #111;
            --border:  rgba(255,255,255,0.12);
            --border2: rgba(255,255,255,0.2);
            --accent: #fff;
            --blue:  #38bdf8;
            --green: #34d399;
            --red:   #fb7185;
            --amber: #fbbf24;
            --gold:  #eab308;
            
            /* ── Brightened Text Palette ── */
            --text:  #ffffff;             /* Pure White */
            --text2: rgba(255,255,255,0.88); /* Secondary text */
            --text3: rgba(255,255,255,0.55); /* Labels and metadata */
            --glow:  0 0 30px rgba(56,189,248,0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist Mono', monospace;
            overflow: hidden;
        }

        /* ── Dot-grid background ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, black 40%, transparent 100%);
            pointer-events: none; z-index: 0; opacity: .5;
        }

        #app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

        /* ── TOPBAR ── */
        .topbar {
            height: 54px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 20px; gap: 14px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            flex-shrink: 0; z-index: 10;
        }
        .topbar-logo {
            font-weight: 800; font-size: 15px; letter-spacing: -.5px;
            display: flex; align-items: center; gap: 8px;
        }
        .logo-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--blue), #0284c7);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 14px rgba(56,189,248,0.4);
        }
        .topbar-logo span { color: var(--text3); }
        .topbar-spacer { flex: 1; }
        
        .status-badge {
            display: flex; align-items: center; gap: 6px;
            background: rgba(52,211,153,0.1);
            border: 1px solid rgba(52,211,153,0.25);
            padding: 4px 11px; border-radius: 100px;
            font-size: 11px; color: var(--green); font-weight: 600;
        }
        .status-badge.loading {
            background: rgba(251,191,36,0.1);
            border-color: rgba(251,191,36,0.25);
            color: var(--amber);
        }
        .status-badge.error {
            background: rgba(251,113,133,0.1);
            border-color: rgba(251,113,133,0.25);
            color: var(--red);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%; background: currentColor;
            animation: pulse-dot 2s ease infinite;
        }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.35} }

        .counter-chip {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            padding: 4px 10px; border-radius: 8px;
            font-size: 11px; color: var(--text2);
        }
        .counter-chip b { color: #fff; font-weight: 700; }

        .layout { display: flex; flex: 1; overflow: hidden; }

        /* ── PLAYER SIDE ── */
        .player-side {
            flex: 1; display: flex; flex-direction: column;
            padding: 20px; gap: 14px; overflow: hidden;
        }

        .video-wrap {
            position: relative;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
            flex-shrink: 0;
            box-shadow: var(--glow);
        }
        #videoPlayer { width: 100%; height: 100%; display: block; background: #000; }

        .video-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7);
            pointer-events: none;
            opacity: 0; transition: opacity .3s;
        }
        .video-overlay.show { opacity: 1; }
        .spinner-ring {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Now-playing bar */
        .now-playing {
            display: flex; align-items: center; gap: 14px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px; padding: 14px 18px;
            flex-shrink: 0;
        }
        .np-icon {
            width: 38px; height: 38px; border-radius: 8px;
            background: rgba(56,189,248,0.12);
            border: 1px solid rgba(56,189,248,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .np-label {
            font-size: 10px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text3);
            margin-bottom: 4px;
        }
        .np-name {
            font-size: 15px; font-weight: 600; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .np-name.idle { color: var(--text3); font-weight: 400; }
        
        .np-badge {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; color: var(--text3);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            padding: 5px 12px; border-radius: 100px;
        }
        .np-badge.playing {
            color: var(--green);
            background: rgba(52,211,153,0.1);
            border-color: rgba(52,211,153,0.2);
        }

        .credit-line {
            font-size: 11px; color: var(--text3); letter-spacing: .3px;
            padding: 0 4px;
        }
        .credit-line b { color: var(--gold); font-weight: 600; }

        /* ── CHANNEL LIST SIDE ── */
        .channel-side {
            width: 340px; flex-shrink: 0;
            border-left: 1px solid var(--border);
            background: #050505;
            display: flex; flex-direction: column;
        }

        .ch-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .ch-title {
            font-size: 11px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--text3);
            margin-bottom: 12px;
        }

        .search-wrap { position: relative; }
        .search-icon {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 13px; color: var(--text3);
        }
        #search-input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            color: #fff;
            font-family: 'Geist Mono', monospace;
            font-size: 13px;
            padding: 10px 12px 10px 36px;
            border-radius: 9px; outline: none;
        }
        #search-input:focus { border-color: var(--text3); }
        #search-input::placeholder { color: rgba(255,255,255,0.4); }

        #channel-list-container { flex: 1; overflow-y: auto; padding: 10px; }

        .ch-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px;
            border-radius: 9px;
            cursor: pointer; text-decoration: none;
            color: var(--text2);
            border: 1px solid transparent;
            margin-bottom: 4px;
        }
        .ch-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--border);
            color: #fff;
        }
        .ch-item.active {
            background: rgba(56,189,248,0.1);
            border-color: rgba(56,189,248,0.3);
            color: #fff;
        }
        .ch-logo {
            width: 32px; height: 32px;
            border-radius: 7px;
            object-fit: contain;
            background: #fff;
            padding: 2px; flex-shrink: 0;
        }
        .ch-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; }

        #loader {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 14px; padding: 60px 20px;
            color: var(--text3);
        }

        @media (max-width: 768px) {
            html, body { overflow: auto; }
            .layout { flex-direction: column; }
            .channel-side { width: 100%; border-left: none; height: 50vh; }
        }
    </style>
</head>
<body>
<div id="app">

    <div class="topbar">
        <div class="topbar-logo">
            <div class="logo-icon">📺</div>
            NikshepOS<span>.tv</span>
        </div>
        <div class="topbar-spacer"></div>
        <div class="counter-chip" id="channel-count" style="display:none">
            <b id="ch-count-num">0</b> channels
        </div>
        <div class="status-badge loading" id="top-status">
            <div class="status-dot"></div>
            <span id="top-status-text">Loading</span>
        </div>
    </div>

    <div class="layout">
        <div class="player-side">
            <div class="video-wrap">
                <video id="videoPlayer" controls autoplay poster="https://i.imgur.com/gC5sJd7.png"></video>
                <div class="video-overlay" id="video-overlay">
                    <div class="spinner-ring"></div>
                </div>
            </div>

            <div class="now-playing">
                <div class="np-icon" id="np-icon">📡</div>
                <div style="flex:1;min-width:0">
                    <div class="np-label">Now Playing</div>
                    <div class="np-name idle" id="np-name">Select a channel to begin</div>
                </div>
                <div class="np-badge" id="np-badge">
                    <div class="status-dot"></div>
                    IDLE
                </div>
            </div>

            <div class="credit-line">
                Buffering? Click twice &nbsp;·&nbsp; Engine by <b>NikshepOS</b>
            </div>
        </div>

        <div class="channel-side">
            <div class="ch-header">
                <div class="ch-title">Channels</div>
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Search channels…" autocomplete="off">
                </div>
            </div>
            <div id="channel-list-container">
                <div id="channel-list">
                    <div id="loader">
                        <div class="spinner-ring"></div>
                        <div style="font-size:12px">Syncing Streams…</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('videoPlayer');
    const channelListEl = document.getElementById('channel-list');
    const searchInput = document.getElementById('search-input');
    const loader = document.getElementById('loader');
    const listContainer = document.getElementById('channel-list-container');
    const videoOverlay = document.getElementById('video-overlay');
    const npName = document.getElementById('np-name');
    const npBadge = document.getElementById('np-badge');
    const topStatus = document.getElementById('top-status');
    const topStatusTxt = document.getElementById('top-status-text');
    const chCountChip = document.getElementById('channel-count');
    const chCountNum = document.getElementById('ch-count-num');

    const M3U_URL = 'https://raw.githubusercontent.com/siam3310/cdn-tv/refs/heads/main/siamcdnplaylist.m3u';
    let hls;
    let allChannels = [];
    let activeChannelName = null;
    const CHANNELS_PER_PAGE = 50;
    let currentPage = 1;

    function setTopStatus(state, text) {
        topStatus.className = 'status-badge ' + state;
        topStatusTxt.textContent = text;
    }

    function setNowPlaying(name, state) {
        npName.textContent = name;
        npName.classList.toggle('idle', state === 'idle');
        if (state === 'playing') {
            npBadge.className = 'np-badge playing';
            npBadge.innerHTML = '<div class="status-dot"></div> LIVE';
        } else if (state === 'loading') {
            npBadge.className = 'np-badge';
            npBadge.innerHTML = '<div class="status-dot"></div> LOADING';
        } else {
            npBadge.className = 'np-badge';
            npBadge.innerHTML = '<div class="status-dot"></div> IDLE';
        }
    }

    function playChannel(channelName) {
        const streamUrl = `/api/proxy?channel=${encodeURIComponent(channelName)}`;
        activeChannelName = channelName;
        setNowPlaying(channelName, 'loading');
        setTopStatus('loading', 'Buffering');
        videoOverlay.classList.add('show');

        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.play();
                setNowPlaying(channelName, 'playing');
                setTopStatus('', 'Live');
                videoOverlay.classList.remove('show');
            });
        }
        updateActiveChannel();
    }

    async function fetchAndParseM3U() {
        try {
            const response = await fetch(M3U_URL);
            const m3uText = await response.text();
            const lines = m3uText.split(/\n/);
            let channels = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',').pop().trim();
                    const logoMatch = lines[i].match(/tvg-logo="([^"]+)"/);
                    channels.push({
                        name: name,
                        logo: logoMatch ? logoMatch[1] : 'https://i.imgur.com/Nl4aZCF.png'
                    });
                }
            }
            allChannels = channels;
            loader.style.display = 'none';
            chCountNum.textContent = channels.length;
            chCountChip.style.display = '';
            setTopStatus('', 'Ready');
            renderInitialChannels();
        } catch (e) {
            setTopStatus('error', 'Fetch Failed');
        }
    }

    function renderChannels(chs) {
        chs.forEach(channel => {
            const item = document.createElement('div');
            item.className = 'ch-item';
            item.dataset.channelName = channel.name;
            item.innerHTML = `
                <img src="${channel.logo}" class="ch-logo" onerror="this.src='https://i.imgur.com/Nl4aZCF.png'">
                <span class="ch-name">${channel.name}</span>
            `;
            item.onclick = () => playChannel(channel.name);
            channelListEl.appendChild(item);
        });
        updateActiveChannel();
    }

    function renderInitialChannels() {
        channelListEl.innerHTML = '';
        renderChannels(allChannels.slice(0, CHANNELS_PER_PAGE));
    }

    function updateActiveChannel() {
        document.querySelectorAll('.ch-item').forEach(item => {
            item.classList.toggle('active', item.dataset.channelName === activeChannelName);
        });
    }

    searchInput.addEventListener('input', () => {
        const term = searchInput.value.toLowerCase();
        if (!term) { renderInitialChannels(); return; }
        const filtered = allChannels.filter(c => c.name.toLowerCase().includes(term));
        channelListEl.innerHTML = '';
        renderChannels(filtered);
    });

    document.addEventListener('DOMContentLoaded', fetchAndParseM3U);
</script>
</body>
</html>
